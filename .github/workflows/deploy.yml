name: Build and deploy ASP.Net Core app to Azure

on:
  push:
    branches: [ "main" ] # Оскільки на скрінах у тебе main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Restore dependencies
        run: dotnet restore LNUBookShare.sln # Або LNUBookShare.slnx, якщо .sln зник

      - name: Build with dotnet
        run: dotnet build LNUBookShare.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test LNUBookShare.sln --configuration Release --no-build

      - name: Publish
        # Тут вказуємо шлях до веб-проекту (перевір назву папки!)
        run: dotnet publish LNUBookShare.Web/*.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lnu-bookshare-pmi33'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .