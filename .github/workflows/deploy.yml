name: Build and deploy ASP.Net Core app to Azure

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Restore
        run: dotnet restore LNUBookShare.Web/LNUBookShare.slnx

      - name: Build
        run: dotnet build LNUBookShare.Web/LNUBookShare.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test LNUBookShare.Web/LNUBookShare.slnx --configuration Release --no-build

      - name: Publish
        run: dotnet publish LNUBookShare.Web/LNUBookShare.Web.csproj -c Release -o ./publish

      - name: dotnet publish
        run: |
          PROJ_FILE=$(find . -name "LNUBookShare.Web.csproj" | head -n 1)
          echo "Đîáîň çíŕéřîâ ďđîĺęň ňóň: $PROJ_FILE"
          dotnet publish "$PROJ_FILE" -c Release -o ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lnu-bookshare-pmi33'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .