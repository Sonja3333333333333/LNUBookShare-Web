name: Build and deploy ASP.Net Core app to Azure

env:
  AZURE_WEBAPP_NAME: 'lnu-bookshare-pmi33'    # Твоя назва в Azure
  AZURE_WEBAPP_PACKAGE_PATH: '.'             # Корінь репозиторію
  DOTNET_VERSION: '10.0.x'                    # Твоя версія .NET (якщо 10, то міняй на 10)

on:
  push:
    branches: [ "master", "main" ]           # Спрацює і на master, і на main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test --configuration Release --no-build --verbosity normal
      # -----------------------------------------

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production' # Міняємо на Production, бо ми серйозні люди

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} # Секрет у GitHub
          package: .