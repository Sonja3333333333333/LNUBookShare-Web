name: Build and deploy ASP.Net Core app to Azure

env:
  AZURE_WEBAPP_NAME: 'lnu-bookshare-pmi33'
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '10.0.x'

on:
  push:
    branches: [ "master", "main", "final-lab-v5" ] # Спрацює на новій гілці
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore LNUBookShare.sln # ЯВНО ВКАЗАЛИ ФАЙЛ

      - name: Build with dotnet
        run: dotnet build LNUBookShare.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test LNUBookShare.sln --configuration Release --no-build

      - name: dotnet publish
        run: dotnet publish LNUBookShare.Web/LNUBookShare.Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .